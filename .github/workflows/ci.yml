name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - run: go mod download
      - run: go test -buildvcs=false ./...
      - run: go build -buildvcs=false -o dist/dbmigrate .
