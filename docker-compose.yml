services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: dbmigrate_test
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    ports:
      - "5432:5432"

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: dbmigrate_test
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
